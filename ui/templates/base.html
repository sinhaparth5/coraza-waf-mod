{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coraza WAF Mod — {{.Heading}}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#5DBB7B', dark: '#3DA05E', light: '#7EE0A2' },
            navy: '#2B4870',
            canvas: '#F5F7FA',
            surface: '#F8F9FB',
            line: '#ECEEF2',
          },
          fontFamily: {
            sans: ['IBM Plex Sans', 'system-ui', '-apple-system', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7/css/flag-icons.min.css"/>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/sse.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .card { background: #fff; border-radius: 18px; box-shadow: 0 2px 14px rgba(0,0,0,0.055); }
    .btn-primary { background: #5DBB7B; color: #fff; border: none; cursor: pointer; border-radius: 999px; padding: 6px 18px; font-size: 13px; font-weight: 500; font-family: inherit; transition: opacity .15s; }
    .btn-primary:hover { opacity: .88; }
    input, select { font-family: inherit; }
    .focus-green { transition: border-color .15s; }
    .focus-green:focus { border-color: #5DBB7B !important; }
  </style>
</head>
<body class="min-h-screen bg-canvas text-slate-800 font-sans" data-admin-path="{{.AdminPath}}">

<!-- ── Top Navigation ─────────────────────────────────── -->
<header class="bg-white border-b border-line h-14 flex items-center px-6 gap-5 sticky top-0 z-50">

  <!-- Brand -->
  <div class="flex items-center gap-[10px] shrink-0">
    <div class="w-[34px] h-[34px] rounded-full bg-brand flex items-center justify-center">
      <i class="hgi hgi-stroke hgi-rounded hgi-shield-01 text-[15px] text-white"></i>
    </div>
    <span class="font-semibold text-sm text-slate-800">Coraza WAF Mod</span>
  </div>

  <!-- Nav links -->
  <nav class="flex items-center gap-1 ml-2">
    <a href="/admin" class="px-4 py-[6px] rounded-full text-[13px] font-medium no-underline transition-colors duration-150 {{if eq .Page "dashboard"}}bg-brand text-white{{else}}text-slate-500{{end}}">Dashboard</a>
    <a href="/admin/logs" class="px-4 py-[6px] rounded-full text-[13px] font-medium no-underline transition-colors duration-150 {{if eq .Page "logs"}}bg-brand text-white{{else}}text-slate-500{{end}}">Live Logs</a>
    <a href="/admin/ip-rules" class="px-4 py-[6px] rounded-full text-[13px] font-medium no-underline transition-colors duration-150 {{if eq .Page "ip_rules"}}bg-brand text-white{{else}}text-slate-500{{end}}">IP Rules</a>
    <a href="/admin/geo-rules" class="px-4 py-[6px] rounded-full text-[13px] font-medium no-underline transition-colors duration-150 {{if eq .Page "geo_rules"}}bg-brand text-white{{else}}text-slate-500{{end}}">Geo Rules</a>
    <a href="/admin/services" class="px-4 py-[6px] rounded-full text-[13px] font-medium no-underline transition-colors duration-150 {{if eq .Page "services"}}bg-brand text-white{{else}}text-slate-500{{end}}">Services</a>
  </nav>

  <div class="flex-1"></div>

  <!-- Right actions -->
  <div class="flex items-center gap-[10px]">
    <div class="flex items-center gap-2 bg-surface border border-line rounded-full px-[14px] py-[6px] text-[13px] text-slate-500 w-40">
      <i class="hgi hgi-stroke hgi-rounded hgi-search-01 text-[13px]"></i>
      Search...
    </div>
    <div class="relative">
      <button id="notif-btn" class="w-[34px] h-[34px] rounded-full bg-surface border border-line flex items-center justify-center text-slate-500 cursor-pointer relative">
        <i class="hgi hgi-stroke hgi-rounded hgi-notification-03 text-sm"></i>
        {{if gt .AlertCount 0}}
        <span id="notif-badge" class="absolute -top-[3px] -right-[3px] bg-red-500 text-white text-[9px] font-bold rounded-full min-w-[16px] h-4 flex items-center justify-center px-[3px] border-2 border-white">{{if gt .AlertCount 9}}9+{{else}}{{.AlertCount}}{{end}}</span>
        {{end}}
      </button>
      <div id="notif-panel" class="hidden absolute top-11 right-0 w-[300px] bg-white border border-line rounded-2xl shadow-[0_8px_30px_rgba(0,0,0,.12)] z-[100]"></div>
    </div>
    <div class="w-[34px] h-[34px] rounded-full bg-navy flex items-center justify-center text-white text-xs font-bold">A</div>
  </div>
</header>

<!-- ── Page body ──────────────────────────────────────── -->
<div class="flex min-h-[calc(100vh-56px)]">

  <main class="flex-1 p-6 min-w-0">
    <!-- Page header -->
    <div class="flex items-start justify-between mb-6">
      <div>
        <p class="text-[11px] text-slate-500 mb-1">Admin › {{.Heading}}</p>
        <h1 class="text-2xl font-extrabold text-slate-900 leading-[1.2]">{{.Heading}}</h1>
      </div>
      {{block "actions" .}}{{end}}
    </div>

    {{block "content" .}}{{end}}
  </main>

  {{block "sidebar" .}}{{end}}

</div>

<script src="{{.AdminPath}}/static/js/app.min.js" defer></script>
{{block "scripts" .}}{{end}}
</body>
</html>
{{end}}
