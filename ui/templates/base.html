{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coraza WAF Mod — {{.Heading}}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7/css/flag-icons.min.css"/>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/sse.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #F5F7FA; color: #1E293B; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .card { background: #fff; border-radius: 18px; box-shadow: 0 2px 14px rgba(0,0,0,0.055); }
    .btn-primary { background: #5DBB7B; color: #fff; border: none; cursor: pointer; border-radius: 999px; padding: 6px 18px; font-size: 13px; font-weight: 500; font-family: inherit; transition: opacity .15s; }
    .btn-primary:hover { opacity: .88; }
    input, select { font-family: inherit; }
  </style>
</head>
<body style="min-height:100vh;">

<!-- ── Top Navigation ─────────────────────────────────── -->
<header style="background:#fff; border-bottom:1px solid #ECEEF2; height:56px; display:flex; align-items:center; padding:0 24px; gap:20px; position:sticky; top:0; z-index:50;">

  <!-- Brand -->
  <div style="display:flex; align-items:center; gap:10px; flex-shrink:0;">
    <div style="width:34px; height:34px; border-radius:50%; background:#5DBB7B; display:flex; align-items:center; justify-content:center;">
      <i class="hgi hgi-stroke hgi-rounded hgi-shield-01" style="font-size:15px; color:#fff;"></i>
    </div>
    <span style="font-weight:600; font-size:14px; color:#1E293B;">Coraza WAF Mod</span>
  </div>

  <!-- Nav links -->
  <nav style="display:flex; align-items:center; gap:4px; margin-left:8px;">
    <a href="/admin" style="padding:6px 16px; border-radius:999px; font-size:13px; font-weight:500; text-decoration:none; transition:background .15s;
      {{if eq .Page "dashboard"}}background:#5DBB7B; color:#fff;{{else}}color:#64748B;{{end}}">Dashboard</a>
    <a href="/admin/logs" style="padding:6px 16px; border-radius:999px; font-size:13px; font-weight:500; text-decoration:none; transition:background .15s;
      {{if eq .Page "logs"}}background:#5DBB7B; color:#fff;{{else}}color:#64748B;{{end}}">Live Logs</a>
    <a href="/admin/ip-rules" style="padding:6px 16px; border-radius:999px; font-size:13px; font-weight:500; text-decoration:none; transition:background .15s;
      {{if eq .Page "ip_rules"}}background:#5DBB7B; color:#fff;{{else}}color:#64748B;{{end}}">IP Rules</a>
    <a href="/admin/geo-rules" style="padding:6px 16px; border-radius:999px; font-size:13px; font-weight:500; text-decoration:none; transition:background .15s;
      {{if eq .Page "geo_rules"}}background:#5DBB7B; color:#fff;{{else}}color:#64748B;{{end}}">Geo Rules</a>
  </nav>

  <div style="flex:1;"></div>

  <!-- Right actions -->
  <div style="display:flex; align-items:center; gap:10px;">
    <div style="display:flex; align-items:center; gap:8px; background:#F8F9FB; border:1px solid #ECEEF2; border-radius:999px; padding:6px 14px; font-size:13px; color:#94A3B8; width:160px;">
      <i class="hgi hgi-stroke hgi-rounded hgi-search-01" style="font-size:13px;"></i>
      Search...
    </div>
    <button style="width:34px; height:34px; border-radius:50%; background:#F8F9FB; border:1px solid #ECEEF2; display:flex; align-items:center; justify-content:center; color:#64748B; cursor:pointer;">
      <i class="hgi hgi-stroke hgi-rounded hgi-notification-03" style="font-size:14px;"></i>
    </button>
    <div style="width:34px; height:34px; border-radius:50%; background:#2B4870; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:700;">A</div>
  </div>
</header>

<!-- ── Page body ──────────────────────────────────────── -->
<div style="display:flex; min-height:calc(100vh - 56px);">

  <main style="flex:1; padding:24px; min-width:0;">
    <!-- Page header -->
    <div style="display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px;">
      <div>
        <p style="font-size:11px; color:#94A3B8; margin-bottom:4px;">Admin › {{.Heading}}</p>
        <h1 style="font-size:24px; font-weight:800; color:#0F172A; line-height:1.2;">{{.Heading}}</h1>
      </div>
      {{block "actions" .}}{{end}}
    </div>

    {{block "content" .}}{{end}}
  </main>

  {{block "sidebar" .}}{{end}}

</div>
</body>
</html>
{{end}}
