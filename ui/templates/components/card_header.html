{{define "card-header"}}
<div class="flex items-center justify-between px-6 py-5">
  <div>
    <p class="text-[12px] text-slate-500 mb-[2px]">{{.Cat}}</p>
    <h3 class="text-[17px] font-bold text-slate-900">{{.Title}}</h3>
  </div>
  <span class="text-[12px] font-semibold bg-slate-100 text-slate-500 px-3 py-1 rounded-full">{{.Badge}}</span>
</div>
{{end}}
