{{define "login"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in — Coraza WAF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] },
          colors: {
            brand: { DEFAULT: '#76C893', dark: '#2A9D8F', light: '#9FE0B7', tint: '#EAF7EE' },
          },
        },
      },
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px #fff inset;
      -webkit-text-fill-color: #1e293b;
    }
  </style>
</head>

<!-- Light green-to-white background -->
<body class="min-h-screen flex items-center justify-center p-8"
      style="background: radial-gradient(ellipse 120% 100% at 50% 50%, #ffffff 0%, #eaf7ee 45%, #c8efd7 100%);">

  <!--
    The card wrapper is `relative` so the spirals are positioned
    relative to the card itself, not the viewport.
    `overflow-visible` lets them bleed outside the card edges.
  -->
  <div class="relative" style="width: 100%; max-width: 480px;">

    <!-- ── Spirals around the card ────────────────────────────────────────── -->

    <!-- top-left -->
    <img src="{{.AdminPath}}/static/imgs/spiral-1.png" alt="" aria-hidden="true"
         class="absolute pointer-events-none select-none"
         style="width:130px; top:-65px; left:-70px; opacity:0.55; transform: rotate(-25deg);
                filter: hue-rotate(80deg) saturate(0.8) brightness(1.05);"/>

    <!-- top-right -->
    <img src="{{.AdminPath}}/static/imgs/spiral-2.png" alt="" aria-hidden="true"
         class="absolute pointer-events-none select-none"
         style="width:110px; top:-50px; right:-55px; opacity:0.50; transform: rotate(40deg);
                filter: hue-rotate(80deg) saturate(0.8) brightness(1.05);"/>

    <!-- mid-left -->
    <img src="{{.AdminPath}}/static/imgs/spiral-6.png" alt="" aria-hidden="true"
         class="absolute pointer-events-none select-none"
         style="width:95px; top:38%; left:-60px; opacity:0.45; transform: translateY(-50%) rotate(-55deg);
                filter: hue-rotate(80deg) saturate(0.8) brightness(1.05);"/>

    <!-- mid-right -->
    <img src="{{.AdminPath}}/static/imgs/spiral-3.png" alt="" aria-hidden="true"
         class="absolute pointer-events-none select-none"
         style="width:100px; top:30%; right:-58px; opacity:0.45; transform: rotate(15deg);
                filter: hue-rotate(80deg) saturate(0.8) brightness(1.05);"/>

    <!-- bottom-left -->
    <img src="{{.AdminPath}}/static/imgs/spiral-5.png" alt="" aria-hidden="true"
         class="absolute pointer-events-none select-none"
         style="width:115px; bottom:-55px; left:-60px; opacity:0.50; transform: rotate(55deg);
                filter: hue-rotate(80deg) saturate(0.8) brightness(1.05);"/>

    <!-- bottom-right -->
    <img src="{{.AdminPath}}/static/imgs/spiral-4.png" alt="" aria-hidden="true"
         class="absolute pointer-events-none select-none"
         style="width:105px; bottom:-48px; right:-52px; opacity:0.50; transform: rotate(-30deg);
                filter: hue-rotate(80deg) saturate(0.8) brightness(1.05);"/>

    <!-- ── Login card ──────────────────────────────────────────────────────── -->
    <div class="relative z-10 rounded-[40px] bg-white px-10 py-12"
         style="border: 2.5px solid rgba(118,200,147,0.45);
                box-shadow: 0 20px 60px rgba(42,157,143,0.10), 0 4px 20px rgba(0,0,0,0.06);">

      <!-- Brand -->
      <p class="text-brand-dark text-lg font-bold tracking-tight mb-1">Coraza WAF</p>
      <h1 class="text-slate-900 text-4xl font-extrabold mb-8 leading-tight">Login</h1>

      <!-- Error message -->
      {{if .Error}}
      <div class="mb-5 rounded-xl text-red-700 text-sm px-4 py-3"
           style="background: #fef2f2; border: 1px solid #fecaca;">
        {{.Error}}
      </div>
      {{end}}

      <form action="{{.AdminPath}}/login" method="POST" novalidate>

        <!-- Email -->
        <div class="mb-5">
          <label class="block text-slate-700 text-sm font-semibold mb-2" for="login-email">Email</label>
          <input
            id="login-email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="admin@example.com"
            required
            class="w-full rounded-[10px] border border-slate-200 bg-white
                   text-slate-800 placeholder-slate-400 text-sm
                   px-4 py-3.5 outline-none transition
                   focus:border-brand focus:ring-2 focus:ring-brand/20"/>
        </div>

        <!-- Password -->
        <div class="mb-2">
          <label class="block text-slate-700 text-sm font-semibold mb-2" for="login-password">Password</label>
          <div class="relative">
            <input
              id="login-password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="Password"
              required
              class="w-full rounded-[10px] border border-slate-200 bg-white
                     text-slate-800 placeholder-slate-400 text-sm
                     px-4 py-3.5 pr-12 outline-none transition
                     focus:border-brand focus:ring-2 focus:ring-brand/20"/>
            <button type="button" id="pw-toggle"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition">
              <svg id="pw-icon-off" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
              </svg>
              <svg id="pw-icon-on" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Forgot password -->
        <p class="text-slate-400 text-xs mb-7 cursor-default">Forgot Password?</p>

        <!-- Submit -->
        <button type="submit"
                class="w-full rounded-[10px] bg-brand text-white text-base font-bold
                       py-3.5 hover:bg-brand-dark active:scale-[0.98] transition-all duration-150
                       shadow-md shadow-brand/25">
          Sign in
        </button>

      </form>
    </div><!-- /card -->

  </div><!-- /card wrapper -->

  <script>
    (function () {
      var toggle  = document.getElementById('pw-toggle');
      var input   = document.getElementById('login-password');
      var iconOff = document.getElementById('pw-icon-off');
      var iconOn  = document.getElementById('pw-icon-on');
      if (!toggle) return;
      toggle.addEventListener('click', function () {
        var hidden = input.type === 'password';
        input.type = hidden ? 'text' : 'password';
        iconOff.classList.toggle('hidden', hidden);
        iconOn.classList.toggle('hidden', !hidden);
      });
    })();
  </script>
</body>
</html>{{end}}
