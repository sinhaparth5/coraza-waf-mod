name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  PACKAGE_NAME: coraza-waf-mod
  GO_VERSION: '1.25.x'
  GOLANGCI_LINT_VERSION: 'v2.12.2'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate embedded assets
        run: go generate ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate embedded assets
        run: go generate ./...

      - name: Run tests
        run: go test ./...

  test-external-db:
    name: Test (${{ matrix.driver }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - driver: mysql
            dsn: 'root:test@tcp(127.0.0.1:3306)/'
          - driver: postgres
            dsn: 'postgres://postgres:test@127.0.0.1:5432/coraza_test?sslmode=disable'
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: test
        ports:
          - 3306:3306
        # MySQL's entrypoint runs a temporary server for init scripts, shuts
        # it down, then restarts as the real server — mysqladmin ping can
        # succeed against that temporary instance, a false-positive matching
        # docker-compose.test.yml's own header comment about the same
        # ~20-25s two-phase startup. health-start-period + health-retries
        # give the real server time to come up before any step that depends
        # on `services.mysql` runs.
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot 2>/dev/null || exit 1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s
        # mysql:8 has no MYSQL_DATABASE env — internal/storage/testdb_test.go's
        # createTestDatabase creates its own uniquely-named database per test
        # via an admin DSN with no database selected.
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: coraza_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate embedded assets
        run: go generate ./...

      - name: Run internal/storage tests against ${{ matrix.driver }}
        env:
          TEST_DB_DRIVER: ${{ matrix.driver }}
          TEST_DB_DSN: ${{ matrix.dsn }}
        run: go test ./internal/storage/... -v

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, test, test-external-db]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build release artifacts
        run: |
          make dist VERSION="${GITHUB_REF_NAME}"
          make checksums

      - name: Build release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes_file="release-notes.md"
          changelog_file="release-changelog.md"

          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; next }
            capture && $0 ~ "^## \\[" { capture = 0 }
            capture { print }
          ' CHANGELOG.md > "$changelog_file"

          {
            if [ -s "$changelog_file" ]; then
              sed '/^[[:space:]]*$/d' "$changelog_file"
            else
              echo "Release notes were not found in CHANGELOG.md for ${GITHUB_REF_NAME}."
              echo
              echo "Add a section named ## [${version}] before tagging to publish detailed notes automatically."
            fi

            cat <<EOF | sed 's/^          //'

          ## Install (Linux)

          \`\`\`bash
          curl -fsSL https://waf-install.astrareconslabs.com/coraza-waf-mod/install.sh | sudo bash
          \`\`\`

          Pin to this exact version:
          \`\`\`bash
          curl -fsSL https://waf-install.astrareconslabs.com/coraza-waf-mod/install.sh | sudo CORAZA_VERSION=${GITHUB_REF_NAME} bash
          \`\`\`

          Re-running the installer is safe. It upgrades the binary and restarts the service without touching your existing config or database.

          ## Docker

          \`\`\`bash
          docker run -d --name coraza-waf-mod -p 8080:8080 -v coraza-waf-data:/data ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME#v}
          \`\`\`

          Multi-arch (linux/amd64, linux/arm64). Persistent state (\`waf.db\`, \`certs/\`) lives under \`/data\` — mount a volume there. Also published to Docker Hub.

          ## Verify checksums

          \`\`\`bash
          sha256sum --check checksums.txt
          \`\`\`

          ## What's inside the binary

          Everything is embedded, so no external files are needed at runtime:
          - Admin UI (HTMX + Tailwind templates + minified JS)
          - Bundled GeoLite2 Country database (geo blocking)
          - Bundled DB-IP ASN Lite database (ISP/org lookup)
          - OWASP Core Rule Set (WAF rules)

          The only files created on disk at runtime are \`waf.db\` (SQLite) and \`certs/\` (TLS, if enabled).
          EOF
          } > "$notes_file"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: Coraza WAF Mod ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            dist/${{ env.PACKAGE_NAME }}-linux-amd64
            dist/${{ env.PACKAGE_NAME }}-linux-arm64
            dist/${{ env.PACKAGE_NAME }}-windows-amd64.exe
            dist/checksums.txt

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [lint, test, test-external-db]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.PACKAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
