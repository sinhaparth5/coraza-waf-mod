<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Just a moment — {{.Host}}</title>
  <link rel="icon" type="image/svg+xml" href="/_cz/logo.svg">
  <style>
    :root {
      --bg: #ffffff;
      --ink: #232323;
      --muted: #595959;
      --faint: #8a8f8a;
      --line: #e3e6e3;
      --green: #3aab6a;
      --green-dark: #2f8f57;
      --red: #c2452d;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1e1c;
        --ink: #ececec;
        --muted: #a8ada8;
        --faint: #7c817c;
        --line: #343834;
        --green: #4dbd7c;
        --green-dark: #6fd39a;
        --red: #e06a52;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      width: min(600px, 100% - 48px);
      display: flex;
      flex-direction: column;
      padding-top: 18vh;
      padding-bottom: 32px;
      min-height: 100%;
    }
    .wordmark {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }
    .wordmark img { width: 32px; height: 32px; display: block; }
    .wordmark span {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .01em;
    }
    h1 {
      font-size: 30px;
      font-weight: 600;
      line-height: 1.2;
      overflow-wrap: anywhere;
      margin-bottom: 10px;
    }
    .sub {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 28px;
    }
    /* Verification widget — the one stateful element on the page. */
    .widget {
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 16px 18px;
      max-width: 380px;
      margin-bottom: 28px;
    }
    .widget .state { width: 28px; height: 28px; position: relative; flex-shrink: 0; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--line);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .check, .cross { display: none; width: 28px; height: 28px; }
    .widget[data-state="ok"] .spinner,
    .widget[data-state="fail"] .spinner { display: none; }
    .widget[data-state="ok"] .check { display: block; animation: pop .25s ease-out; }
    .widget[data-state="fail"] .cross { display: block; }
    .widget p { font-size: 14px; font-weight: 500; }
    .widget[data-state="fail"] p { color: var(--red); }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pop { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .spinner { animation: none; }
      .widget[data-state="ok"] .check { animation: none; }
    }
    .hint {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 46ch;
    }
    footer {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--faint);
    }
    footer .ref { font-variant-numeric: tabular-nums; }
    footer .by { display: flex; align-items: center; gap: 7px; }
    footer .by img { width: 16px; height: 16px; }
    footer .by b { font-weight: 600; color: var(--muted); }
    /* CSS vars don't resolve in SVG presentation attributes — style via CSS. */
    .check circle, .check path { stroke: var(--green); }
    .cross circle, .cross path { stroke: var(--red); }
  </style>
</head>
<body>
<div class="page">
  <div class="wordmark">
    <img src="/_cz/logo.svg" alt="">
    <span>Coraza WAF</span>
  </div>

  <h1>{{.Host}}</h1>
  <p class="sub">Checking your browser before you continue.</p>

  <div class="widget" id="widget" data-state="wait">
    <div class="state">
      <div class="spinner"></div>
      <svg class="check" viewBox="0 0 28 28" aria-hidden="true">
        <circle cx="14" cy="14" r="13" fill="none" stroke-width="2"/>
        <path d="M8 14.5l4 4 8-9" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg class="cross" viewBox="0 0 28 28" aria-hidden="true">
        <circle cx="14" cy="14" r="13" fill="none" stroke-width="2"/>
        <path d="M9.5 9.5l9 9M18.5 9.5l-9 9" fill="none" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <p id="widget-msg" role="status" aria-live="polite">Verifying your browser…</p>
  </div>

  <p class="hint" id="hint">This check is automatic — you'll be redirected to your requested page in a few seconds.</p>

  <footer>
    <span class="ref">Reference ID: {{.RefID}}</span>
    <span class="by">
      <img src="/_cz/logo.svg" alt="">
      <span>Performance &amp; security by <b>Coraza WAF</b></span>
    </span>
  </footer>
</div>

<script src="/_cz/fp.js"></script>
<script>
(function () {
  var cfg = {{.ConfigJSON}};
  var widget = document.getElementById('widget');
  var msg = document.getElementById('widget-msg');
  var hint = document.getElementById('hint');

  function setState(state, text) {
    widget.dataset.state = state;
    msg.textContent = text;
  }

  // Browser fingerprint (FingerprintJS) — computed while the PoW runs.
  // Never blocks verification: any failure or a 3s timeout yields ''.
  function getVisitorId() {
    if (typeof FingerprintJS === 'undefined') return Promise.resolve('');
    var timeout = new Promise(function (resolve) { setTimeout(function () { resolve(''); }, 3000); });
    var fingerprint = FingerprintJS.load()
      .then(function (fp) { return fp.get(); })
      .then(function (result) { return result.visitorId || ''; })
      .catch(function () { return ''; });
    return Promise.race([fingerprint, timeout]);
  }

  async function solve(nonce) {
    var sol = 0;
    while (true) {
      var buf = new TextEncoder().encode(nonce + sol);
      var hash = new Uint8Array(await crypto.subtle.digest('SHA-256', buf));
      if (hash[0] === 0) return sol;
      sol++;
      // yield every 200 iterations so the browser stays responsive
      if (sol % 200 === 0) await new Promise(function(r){ setTimeout(r, 0); });
    }
  }

  Promise.all([solve(cfg.nonce), getVisitorId()])
    .then(function (results) {
      return fetch('/_cz/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nonce: cfg.nonce, exp: cfg.exp, sig: cfg.sig, solution: results[0], visitor_id: results[1] })
      });
    })
    .then(function (resp) {
      if (resp.ok) {
        setState('ok', 'Verification successful');
        hint.textContent = 'Redirecting…';
        setTimeout(function () { window.location.href = cfg.redirect || '/'; }, 400);
      } else {
        setState('fail', 'Verification failed');
        hint.textContent = 'Your browser could not be verified. Refresh the page to try again.';
      }
    })
    .catch(function () {
      setState('fail', 'Something went wrong');
      hint.textContent = 'The check could not be completed. Refresh the page to try again.';
    });
})();
</script>
</body>
</html>
