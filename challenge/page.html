<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checking your browser…</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F4F7F9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1e293b;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      border: 1px solid #E2E5EA;
      box-shadow: 0 10px 40px rgba(0,0,0,.05);
      padding: 48px 40px;
      text-align: center;
      width: 100%;
      max-width: 380px;
    }
    .shield {
      width: 56px;
      height: 56px;
      background: #EAF7EE;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .shield svg { width: 28px; height: 28px; }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid #E2E5EA;
      border-top-color: #76C893;
      border-radius: 50%;
      animation: spin .75s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    p  { font-size: 14px; color: #64748b; line-height: 1.5; }
    .brand { font-size: 11px; color: #94a3b8; margin-top: 32px; letter-spacing: .04em; }
  </style>
</head>
<body>
<div class="card">
  <div class="spinner" id="spin"></div>
  <h2>Checking your browser…</h2>
  <p id="msg">Please wait a moment.</p>
  <p class="brand">Protected by Coraza WAF</p>
</div>
<script>
(function () {
  var cfg = {{.ConfigJSON}};

  async function solve(nonce) {
    var sol = 0;
    while (true) {
      var buf = new TextEncoder().encode(nonce + sol);
      var hash = new Uint8Array(await crypto.subtle.digest('SHA-256', buf));
      if (hash[0] === 0) return sol;
      sol++;
      // yield every 200 iterations so the browser stays responsive
      if (sol % 200 === 0) await new Promise(function(r){ setTimeout(r, 0); });
    }
  }

  solve(cfg.nonce)
    .then(function (solution) {
      return fetch('/_cz/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nonce: cfg.nonce, exp: cfg.exp, sig: cfg.sig, solution: solution })
      });
    })
    .then(function (resp) {
      if (resp.ok) {
        document.getElementById('spin').style.cssText = 'border-color:#76C893;animation:none;';
        document.getElementById('msg').textContent = 'Verified! Redirecting…';
        setTimeout(function () { window.location.href = cfg.redirect || '/'; }, 400);
      } else {
        document.getElementById('msg').textContent = 'Challenge failed — please refresh.';
      }
    })
    .catch(function () {
      document.getElementById('msg').textContent = 'An error occurred. Please refresh.';
    });
})();
</script>
</body>
</html>
