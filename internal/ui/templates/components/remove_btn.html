{{define "remove-btn"}}
<button hx-delete="{{.URL}}"
        hx-target="{{.Target}}"
        hx-swap="innerHTML"
        hx-confirm="{{.Confirm}}"
        class="inline-flex items-center gap-[5px] text-[12px] font-medium text-red-600 bg-white border border-red-200 rounded-md px-3 py-[5px] cursor-pointer font-sans hover:bg-red-50 hover:border-red-300 transition-colors duration-150 shrink-0">
  <i class="hgi hgi-stroke hgi-rounded hgi-delete-02 text-xs"></i>
  Remove
</button>
{{end}}
