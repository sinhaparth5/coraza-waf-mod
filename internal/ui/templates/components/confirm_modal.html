{{define "confirm-modal"}}
<div id="confirm-modal-overlay"
     class="hidden flex fixed inset-0 z-[300] items-center justify-center bg-black/25 fade-in">
  <div class="relative w-[360px] bg-white rounded-[10px] border border-line shadow-[0_8px_24px_rgba(16,24,40,.12)] p-6 modal-pop">

    <div class="flex items-center gap-3 mb-4">
      <div class="w-9 h-9 rounded-md bg-red-50 flex items-center justify-center shrink-0">
        <i class="hgi hgi-stroke hgi-rounded hgi-alert-02 text-base text-red-500"></i>
      </div>
      <h2 class="text-[16px] font-bold text-slate-900">Confirm removal</h2>
    </div>

    <p id="confirm-modal-message"
       class="text-[14px] leading-[1.6] mb-6 text-slate-500"></p>

    <div class="flex gap-2.5">
      <button id="confirm-modal-cancel" type="button"
        class="flex-1 py-[9px] text-[14px] font-semibold cursor-pointer font-sans rounded-md bg-surface text-slate-700 border border-line hover:bg-slate-100 transition-colors duration-150">
        Cancel
      </button>
      <button id="confirm-modal-ok" type="button"
        class="flex-1 py-[9px] text-[14px] font-semibold cursor-pointer font-sans rounded-md bg-red-600 text-white border-none hover:bg-red-700 transition-colors duration-150">
        Remove
      </button>
    </div>
  </div>
</div>
<script>
(function () {
  var overlay   = document.getElementById('confirm-modal-overlay');
  var msgEl     = document.getElementById('confirm-modal-message');
  var btnOk     = document.getElementById('confirm-modal-ok');
  var btnCancel = document.getElementById('confirm-modal-cancel');
  var _resolve  = null;

  function show(q) {
    msgEl.textContent = q;
    overlay.classList.remove('hidden');
    btnOk.focus();
    return new Promise(function (res) { _resolve = res; });
  }

  function hide()    { overlay.classList.add('hidden'); _resolve = null; }
  function confirm() { var r = _resolve; hide(); if (r) r(true);  }
  function cancel()  { var r = _resolve; hide(); if (r) r(false); }

  btnOk.addEventListener('click', confirm);
  btnCancel.addEventListener('click', cancel);
  overlay.addEventListener('click', function (e) { if (e.target === overlay) cancel(); });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && !overlay.classList.contains('hidden')) cancel();
  });

  document.addEventListener('htmx:confirm', function (evt) {
    if (!evt.detail.question) return; // no hx-confirm on this element, let htmx proceed normally
    evt.preventDefault();
    show(evt.detail.question).then(function (ok) { if (ok) evt.detail.issueRequest(true); });
  });
})();
</script>
{{end}}
