{{define "rule-ring-row"}}
<div class="flex items-center gap-3 rounded-lg border border-white/10 px-4 py-3">
  <div class="relative w-10 h-10 shrink-0">
    <svg viewBox="0 0 40 40" class="w-10 h-10 -rotate-90">
      <circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="4"/>
      <circle cx="20" cy="20" r="16" fill="none" stroke="{{.Color}}" stroke-width="4" pathLength="100"
        stroke-dasharray="{{.Pct}} 100" stroke-linecap="round" class="ring-arc"/>
    </svg>
    <span class="absolute inset-0 flex items-center justify-center text-[10px] font-semibold text-white">{{.Pct}}%</span>
  </div>
  <div class="flex-1 min-w-0">
    <p class="text-[13px] font-semibold text-white">{{.Title}}</p>
    <p class="text-[11px] text-white/50">{{.Sub}}</p>
  </div>
  <span class="text-[11px] font-semibold bg-white/10 text-white px-[10px] py-1 rounded shrink-0">{{.Count}} rules</span>
</div>
{{end}}
