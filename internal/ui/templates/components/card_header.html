{{define "card-header"}}
<div class="flex items-center justify-between px-6 py-4 border-b border-line">
  <div>
    <p class="text-[11px] uppercase tracking-[0.08em] font-medium text-slate-500 mb-[2px]">{{.Cat}}</p>
    <h3 class="text-[16px] font-bold text-slate-900">{{.Title}}</h3>
  </div>
  <span class="text-[12px] font-semibold bg-slate-100 text-slate-500 px-2.5 py-1 rounded">{{.Badge}}</span>
</div>
{{end}}
