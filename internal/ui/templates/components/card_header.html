{{define "card-header"}}
<div class="flex items-center justify-between gap-4 px-5 py-4 border-b border-line">
  <div>
    <p class="text-[11px] font-medium uppercase tracking-wide text-slate-500 mb-[2px]">{{.Cat}}</p>
    <h3 class="text-[16px] font-semibold text-slate-900">{{.Title}}</h3>
  </div>
  <span class="text-[11px] font-semibold bg-slate-100 text-slate-600 border border-line px-2 py-1 rounded">{{.Badge}}</span>
</div>
{{end}}
