# ─── Network ─────────────────────────────────────────────────────────────────
listen_addr: ":8080"
# Uncomment to enable HTTPS (TLS cert config is managed from the admin UI):
listen_addr_tls: ":8443"

# ─── TLS ─────────────────────────────────────────────────────────────────────
# Certificate config (ACME email, per-service certs) lives in the admin UI.
# Only the cache directory for Let's Encrypt files is set here.
tls:
  cache_dir: "./certs"

# ─── Geo Blocking ────────────────────────────────────────────────────────────
# The binary includes a bundled GeoLite2-Country.mmdb. Leave db_path empty to
# use it, or set a path here to override it with an externally updated .mmdb.
geo:
  db_path: ""  # e.g. "./GeoLite2-Country.mmdb"

# ─── WAF ─────────────────────────────────────────────────────────────────────
waf:
  enabled: true
  rules_dir: ""   # optional: path to extra .conf files loaded on top of OWASP CRS

# ─── Database ────────────────────────────────────────────────────────────────
db:
  path: "./waf.db"
  log_retention_days: 30  # requests older than this are deleted daily; -1 = keep forever

# ─── Admin UI ────────────────────────────────────────────────────────────────
admin:
  path: "/admin"
  username: "admin"
  password: "changeme"

# ─── Rate Limiting ───────────────────────────────────────────────────────────
# Per-IP token-bucket limiter applied globally, ahead of geo/WAF inspection.
# Disabled by default — the right rate depends on your app's traffic shape.
rate_limit:
  enabled: false
  requests_per_second: 10  # sustained rate per client IP
  burst: 20                # max requests a client can burst before throttling

# ─── Backend Apps ────────────────────────────────────────────────────────────
apps:
  # NOTE: this list is only read once, on first-ever startup, to seed the
  # services table — after that, services are managed entirely from the
  # admin UI (/admin/services) and this list is ignored. Kept here for
  # reference only.
  - name: "react-app"
    host: "localhost"     # matched against the Host header
    backend: "http://localhost:5173"

  # - name: "api"
  #   host: "api.example.com"
  #   backend: "http://api-app:8080"
  #
  # - name: "blog"
  #   host: "blog.example.com"
  #   backend: "http://blog-app:4000"
